<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora de materiais e lucro de cada componente.">
    <title>MDN Garage - Calculadora de Crafts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sedgwick+Ave+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="assets/images/logomdn.png" alt="Logo MDN" class="logo-mdn">
    <img src="assets/images/mdnlogo.png" alt="Logo MDN" class="logo-mdnperformance">
    <div class="app">
        <!-- MAIN CONTENT: Left Sidebar + Center + Right Sidebar -->
        <div class="main-content">
            <!-- LEFT SIDEBAR — Accordion Menu -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h1 class="sidebar-title">Midnight Performance</h1>
                    <span class="sidebar-subtitle">Calculadora</span>
                </div>

                <!-- Accordion: Serviços -->
                <div class="accordion" data-category="services">
                    <button class="accordion-header" id="accordionServices">
                        <div class="accordion-header-left">
                            <span class="accordion-icon">🔧</span>
                            <span class="accordion-label">Serviços</span>
                        </div>
                        <div class="accordion-header-right">
                            <span class="accordion-count" id="servicesCount">0</span>
                            <span class="accordion-arrow">▾</span>
                        </div>
                    </button>
                    <div class="accordion-content" id="servicesList"></div>
                </div>

                <!-- Accordion: Stage -->
                <div class="accordion" data-category="stage">
                    <button class="accordion-header" id="accordionStage">
                        <div class="accordion-header-left">
                            <span class="accordion-icon">⚙️</span>
                            <span class="accordion-label">Stage</span>
                        </div>
                        <div class="accordion-header-right">
                            <span class="accordion-count" id="stageCount">0</span>
                            <span class="accordion-arrow">▾</span>
                        </div>
                    </button>
                    <div class="accordion-content" id="stageList"></div>
                </div>

                <!-- Accordion: Produtos -->
                <div class="accordion" data-category="products">
                    <button class="accordion-header" id="accordionProducts">
                        <div class="accordion-header-left">
                            <span class="accordion-icon">📦</span>
                            <span class="accordion-label">Produtos</span>
                        </div>
                        <div class="accordion-header-right">
                            <span class="accordion-count" id="productsCount">0</span>
                            <span class="accordion-arrow">▾</span>
                        </div>
                    </button>
                    <div class="accordion-content" id="productsList"></div>
                </div>
            </aside>

            <!-- CENTER PANEL — Summary -->
            <div class="detail-panel" id="detailPanel">
                <div class="detail-header">
                    <div>
                        <div class="detail-title" id="detailTitle">Calculadora de Materiais e Valores</div>
                        <div class="detail-subtitle" id="detailSubtitle">Selecione os serviços / itens para calcular</div>
                    </div>
                    <div class="header-controls">
                        <button class="clear-btn" id="clearBtn" style="display:none;">Limpar</button>
                    </div>
                </div>

                <!-- Config & Options Row -->
                <div class="options-row" id="optionsRow" style="display:none;">
                    <!-- Parceiros Dropdown -->
                    <div class="partner-group" id="partnerGroup">
                        <label for="partnerSelect">Parceiro</label>
                        <select id="partnerSelect">
                            <option value="">Nenhum</option>
                        </select>
                    </div>

                    <!-- Desconto -->
                    <div class="discount-input-group" id="discountGroup">
                        <label for="discountInput">Desconto</label>
                        <div class="discount-field">
                            <input type="number" id="discountInput" min="0" max="100" value="0" step="1">
                            <span class="discount-suffix">%</span>
                        </div>
                    </div>

                    <!-- Financial Details Toggle -->
                    <label class="toggle-label" for="financialToggle">
                        <input type="checkbox" id="financialToggle">
                        <span class="toggle-switch"></span>
                        <span class="toggle-text">Exibir detalhes financeiros</span>
                    </label>
                </div>

                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🔧</div>
                    <p>Selecione um ou mais itens no menu ao lado para ver os materiais necessários e o custo total.</p>
                </div>

                <div id="summaryContent" style="display:none;"></div>
            </div>

            <!-- RIGHT SIDEBAR — Selected Items -->
            <aside class="right-sidebar" id="rightSidebar">
                <div class="right-sidebar-header">
                    <h2 class="right-sidebar-title">Selecionados</h2>
                    <span class="right-sidebar-badge" id="selectedTotalCount">0</span>
                </div>
                <div class="right-sidebar-list" id="selectedItemsList">
                    <div class="right-sidebar-empty">Nenhum item selecionado</div>
                </div>
            </aside>
        </div>

        <!-- STICKY TOTAL BAR (always visible) -->
        <div class="total-sticky-bar" id="totalStickyBar">
            <div class="sticky-total-inner">
                <span class="sticky-total-label">Valor Total a ser Cobrado</span>
                <div class="total-value-group">
                    <span class="sticky-total-value" id="stickyTotalValue">$0</span>
                    <button class="copy-btn" id="copyTotalBtn">Copiar</button>
                    <div id="copyNotification" class="copy-notification">Valor copiado.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Data first, then app logic -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
